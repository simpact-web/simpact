<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPACT — Messagerie</title>
  <script src="users.js?v=3"></script>
  <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

      /* ── TOPBAR ── */
      .topbar { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 100; }
      .topbar-left { display: flex; align-items: center; gap: 16px; }
      .logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
      .logo span { color: #f59e0b; }
      .badge-module { background: #f59e0b; color: #000; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
      .topbar-right { display: flex; align-items: center; gap: 12px; }
      .btn-hub { background: #252840; border: 1px solid #3d4166; color: #94a3b8; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; text-decoration: none; transition: all .15s; }
      .btn-hub:hover { background: #2d3148; color: #e2e8f0; }
      .user-badge { background: #1e2235; border: 1px solid #2d3148; padding: 6px 14px; border-radius: 8px; font-size: 13px; color: #94a3b8; }

      /* ── LAYOUT ── */
      .app { display: flex; flex: 1; overflow: hidden; }

      /* ── SIDEBAR CLIENTS ── */
      .sidebar { width: 300px; background: #13151f; border-right: 1px solid #1e2235; display: flex; flex-direction: column; flex-shrink: 0; }
      .sidebar-header { padding: 16px 20px; border-bottom: 1px solid #1e2235; }
      .sidebar-header h2 { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
      .search-box { width: 100%; background: #1a1d2e; border: 1px solid #2d3148; border-radius: 8px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; outline: none; transition: border-color .15s; }
      .search-box:focus { border-color: #f59e0b; }
      .search-box::placeholder { color: #475569; }
      .client-list { flex: 1; overflow-y: auto; padding: 8px; }
      .client-list::-webkit-scrollbar { width: 4px; }
      .client-list::-webkit-scrollbar-track { background: transparent; }
      .client-list::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }
      .client-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: all .15s; position: relative; margin-bottom: 2px; }
      .client-item:hover { background: #1a1d2e; }
      .client-item.active { background: #1e2235; border: 1px solid #2d3148; }
      .client-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0; }
      .client-info { flex: 1; min-width: 0; }
      .client-name { font-size: 13px; font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .client-preview { font-size: 11px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
      .client-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
      .client-time { font-size: 10px; color: #475569; }
      .unread-badge { background: #f59e0b; color: #000; font-size: 10px; font-weight: 700; border-radius: 10px; padding: 1px 6px; min-width: 18px; text-align: center; }
      .no-clients { text-align: center; padding: 40px 20px; color: #475569; font-size: 13px; }

      /* ── CHAT AREA ── */
      .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

      /* État vide */
      .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #475569; }
      .chat-empty .icon { font-size: 48px; margin-bottom: 8px; }
      .chat-empty h3 { font-size: 16px; color: #64748b; }
      .chat-empty p { font-size: 13px; }

      /* Chat header */
      .chat-header { background: #13151f; border-bottom: 1px solid #1e2235; padding: 14px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
      .chat-header-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #fff; flex-shrink: 0; }
      .chat-header-info h3 { font-size: 15px; font-weight: 700; color: #e2e8f0; }
      .chat-header-info p { font-size: 12px; color: #64748b; margin-top: 1px; }
      .online-dot { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; margin-right: 5px; }

      /* Messages */
      .messages-container { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
      .messages-container::-webkit-scrollbar { width: 4px; }
      .messages-container::-webkit-scrollbar-track { background: transparent; }
      .messages-container::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }
      .msg-row { display: flex; gap: 10px; max-width: 70%; }
      .msg-row.from-client { align-self: flex-start; }
      .msg-row.from-admin { align-self: flex-end; flex-direction: row-reverse; }
      .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; align-self: flex-end; }
      .msg-content { display: flex; flex-direction: column; gap: 3px; }
      .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.5; word-break: break-word; }
      .from-client .msg-bubble { background: #1e2235; color: #e2e8f0; border-bottom-left-radius: 4px; }
      .from-admin .msg-bubble { background: #f59e0b; color: #000; font-weight: 500; border-bottom-right-radius: 4px; }
      .msg-time { font-size: 10px; color: #475569; padding: 0 4px; }
      .from-admin .msg-time { text-align: right; }
      .msg-sender { font-size: 10px; color: #64748b; font-weight: 600; padding: 0 4px; margin-bottom: 2px; }
      .date-separator { text-align: center; margin: 8px 0; }
      .date-separator span { background: #1a1d2e; color: #475569; font-size: 11px; padding: 3px 12px; border-radius: 12px; }

      /* Input zone */
      .chat-input-area { background: #13151f; border-top: 1px solid #1e2235; padding: 16px 24px; flex-shrink: 0; }
      .input-row { display: flex; gap: 10px; align-items: flex-end; }
      .msg-input { flex: 1; background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; padding: 10px 16px; color: #e2e8f0; font-size: 14px; resize: none; outline: none; min-height: 44px; max-height: 120px; font-family: inherit; line-height: 1.4; transition: border-color .15s; }
      .msg-input:focus { border-color: #f59e0b; }
      .msg-input::placeholder { color: #475569; }
      .btn-send { background: #f59e0b; color: #000; border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer; font-weight: 700; font-size: 13px; transition: all .15s; white-space: nowrap; flex-shrink: 0; height: 44px; }
      .btn-send:hover { background: #fbbf24; transform: translateY(-1px); }
      .btn-send:active { transform: translateY(0); }
      .btn-send:disabled { background: #374151; color: #6b7280; cursor: not-allowed; transform: none; }

      /* Scroll to bottom btn */
      .scroll-btn { position: absolute; bottom: 90px; right: 30px; background: #f59e0b; color: #000; border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(245,158,11,.4); transition: all .15s; }
      .scroll-btn:hover { background: #fbbf24; transform: scale(1.1); }
      .chat-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }

      /* Stats bar */
      .stats-bar { background: #1a1d2e; border-bottom: 1px solid #1e2235; padding: 0 24px; height: 40px; display: flex; align-items: center; gap: 24px; flex-shrink: 0; }
      .stat-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #64748b; }
      .stat-item strong { color: #94a3b8; }

      /* Toast */
      .toast { position: fixed; bottom: 24px; right: 24px; background: #22c55e; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 12px rgba(0,0,0,.3); z-index: 9999; transform: translateY(60px); opacity: 0; transition: all .3s; }
      .toast.show { transform: translateY(0); opacity: 1; }

      /* Typing indicator */
      .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 8px 14px; background: #1e2235; border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
      .typing-dot { width: 6px; height: 6px; background: #64748b; border-radius: 50%; animation: typing 1.2s infinite; }
      .typing-dot:nth-child(2) { animation-delay: .2s; }
      .typing-dot:nth-child(3) { animation-delay: .4s; }
      @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-4px); opacity: 1; } }

      /* Empty messages */
      .no-messages { text-align: center; padding: 40px; color: #475569; font-size: 13px; margin: auto; }
      .no-messages .icon { font-size: 32px; margin-bottom: 8px; }
    </style>
  </head>
  <body>

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-left">
              <div class="logo">SIMP<span>ACT</span></div>div>
            <span class="badge-module">💬 Messagerie</span>
        </div>div>
      <div class="topbar-right">
          <a href="hub.html" class="btn-hub">← Hub</a>a>
          <div class="user-badge" id="userBadge">—</div>div>
      </div>div>
    </div>div>
  
  <!-- APP -->
  <div class="app">
  
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
              <h2>Conversations</h2>
              <input class="search-box" type="text" id="searchInput" placeholder="Rechercher un client..." oninput="filterClients()">
        </div>div>
        <div class="client-list" id="clientList">
              <div class="no-clients">Chargement...</div>div>
        </div>div>
    </div>div>
  
    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">
        <div class="chat-empty" id="chatEmpty">
              <div class="icon">💬</div>div>
              <h3>Centre de Messagerie</h3>
              <p>Sélectionnez une conversation pour commencer</p>
        </div>div>
        <div class="chat-wrapper" id="chatWrapper" style="display:none;">
              <div class="chat-header" id="chatHeader"></div>div>
              <div class="stats-bar" id="statsBar"></div>div>
              <div class="messages-container" id="messagesContainer"></div>div>
              <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom(true)" title="Aller en bas">↓</button>button>
              <div class="chat-input-area">
                      <div class="input-row">
                                <textarea class="msg-input" id="msgInput" placeholder="Répondre au client..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                                <button class="btn-send" id="sendBtn" onclick="sendAdminMessage()">Envoyer ↗</button>button>
                      </div>div>
              </div>div>
        </div>div>
    </div>div>
  
  </div>div>
  
  <!-- TOAST -->
  <div class="toast" id="toast"></div>div>
  
  <script>
    // ══════════════════════════════════════════════════
    //  SIMPACT — MESSAGERIE ADMIN
    // ══════════════════════════════════════════════════

    let currentUser = null;
    let activeClientId = null;
    let refreshInterval = null;
    let allClients = [];

    // Palette de couleurs pour avatars
    const COLORS = ['#6366f1','#8b5cf6','#ec4899','#14b8a6','#f59e0b','#22c55e','#3b82f6','#ef4444','#06b6d4','#84cc16'];
    function getColor(str) {
        let h = 0;
        for (let c of str) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
        return COLORS[Math.abs(h) % COLORS.length];
    }
    function initials(name) {
        return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
    }
    function fmtTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        const now = new Date();
        const diff = now - d;
        if (diff < 60000) return 'à l\'instant';
        if (diff < 3600000) return Math.floor(diff/60000) + ' min';
        if (diff < 86400000) return d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
        if (diff < 604800000) {
              const days = ['dim.','lun.','mar.','mer.','jeu.','ven.','sam.'];
              return days[d.getDay()] + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        }
        return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
    }
    function fmtDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        const now = new Date();
        const diff = now - d;
        if (diff < 86400000 && d.getDate() === now.getDate()) return 'Aujourd\'hui';
        if (diff < 172800000) return 'Hier';
        return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    }

    // ── INIT ──────────────────────────────────────────
    function init() {
        currentUser = checkAuth(['superadmin','admin','commercial']);
        if (!currentUser) return;
        document.getElementById('userBadge').textContent = currentUser.name;
        loadClientList();
        refreshInterval = setInterval(() => {
              loadClientList(true);
              if (activeClientId) loadMessages(activeClientId, true);
        }, 3000);
    }

    // ── LISTE DES CLIENTS ─────────────────────────────
    function loadClientList(silent = false) {
        const users = getUsers ? getUsers() : [];
        const clients = users.filter(u => u.role === 'client');
        allClients = clients;
        renderClientList(clients, silent);
    }

    function renderClientList(clients, silent = false) {
        const list = document.getElementById('clientList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const filtered = clients.filter(c => c.name.toLowerCase().includes(search) || c.id.toLowerCase().includes(search));

        if (filtered.length === 0) {
              list.innerHTML = '<div class="no-clients">Aucun client trouvé</div>';
              return;
        }

        // Calcul des données pour chaque client
        const enriched = filtered.map(c => {
              const msgs = getMessages ? getMessages(c.id) : [];
              const unread = msgs.filter(m => !m.read && m.from === c.id).length;
              const last = msgs[msgs.length - 1] || null;
              return { ...c, msgs, unread, last };
        });

        // Trier : non lus d'abord, puis par dernier message
        enriched.sort((a, b) => {
              if (b.unread !== a.unread) return b.unread - a.unread;
              const ta = a.last ? new Date(a.last.ts) : new Date(0);
              const tb = b.last ? new Date(b.last.ts) : new Date(0);
              return tb - ta;
        });

        const scrollPos = list.scrollTop;
        list.innerHTML = enriched.map(c => {
              const color = getColor(c.id);
              const init = initials(c.name);
              const preview = c.last ? (c.last.from === c.id ? '' : '✓ ') + c.last.text.substring(0, 35) + (c.last.text.length > 35 ? '…' : '') : 'Aucun message';
              const time = c.last ? fmtTime(c.last.ts) : '';
              const isActive = c.id === activeClientId ? 'active' : '';
              const unreadHtml = c.unread > 0 ? `<span class="unread-badge">${c.unread}</span>` : '';
              return `
                    <div class="client-item ${isActive}" onclick="openChat('${c.id}')" id="ci-${c.id}">
                            <div class="client-avatar" style="background:${color}">${init}</div>
                                    <div class="client-info">
                                              <div class="client-name">${c.name}</div>
                                                        <div class="client-preview">${preview}</div>
                                                                </div>
                                                                        <div class="client-meta">
                                                                                  <span class="client-time">${time}</span>
                                                                                            ${unreadHtml}
                                                                                                    </div>
                                                                                                          </div>`;
        }).join('');
        list.scrollTop = scrollPos;
    }

    function filterClients() {
        renderClientList(allClients);
    }

    // ── OUVRIR UN CHAT ────────────────────────────────
    function openChat(clientId) {
        activeClientId = clientId;
        const users = getUsers ? getUsers() : [];
        const client = users.find(u => u.id === clientId);
        if (!client) return;

        // Marquer comme lu
        if (typeof markMessagesRead === 'function') markMessagesRead(clientId);

        // Afficher le chat
        document.getElementById('chatEmpty').style.display = 'none';
        document.getElementById('chatWrapper').style.display = 'flex';
        document.getElementById('chatWrapper').style.flexDirection = 'column';

        // Header
        const color = getColor(clientId);
        const init = initials(client.name);
        const msgs = getMessages ? getMessages(clientId) : [];
        const sector = client.sector || 'Client';
        document.getElementById('chatHeader').innerHTML = `
            <div class="chat-header-avatar" style="background:${color}">${init}</div>
                <div class="chat-header-info">
                      <h3>${client.name}</h3>
                            <p><span class="online-dot"></span>${sector} · ${msgs.length} message${msgs.length !== 1 ? 's' : ''}</p>
                                </div>`;

        // Stats bar
        const orders = typeof getOrders === 'function' ? getOrders().filter(o => o.clientId === clientId || o.client === clientId) : [];
        const ca = orders.reduce((s, o) => s + parseFloat(o.price || 0), 0);
        document.getElementById('statsBar').innerHTML = `
            <div class="stat-item">📦 Commandes : <strong>${orders.length}</strong></div>
                <div class="stat-item">💰 CA HT : <strong>${ca.toFixed(2)} DT</strong></div>
                    <div class="stat-item">📧 <strong>${client.email || '—'}</strong></div>
                        <div class="stat-item">📞 <strong>${client.phone || '—'}</strong></div>`;

        // Charger messages
        loadMessages(clientId);
        renderClientList(allClients);
        document.getElementById('msgInput').focus();
    }

    // ── CHARGER MESSAGES ──────────────────────────────
    function loadMessages(clientId, silent = false) {
        const msgs = getMessages ? getMessages(clientId) : [];
        const container = document.getElementById('messagesContainer');
        const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
        const prevCount = container.querySelectorAll('.msg-row').length;

        let html = '';
        let lastDate = '';
        msgs.forEach(msg => {
              const msgDate = fmtDate(msg.ts);
              if (msgDate !== lastDate) {
                      lastDate = msgDate;
                      html += `<div class="date-separator"><span>${msgDate}</span></div>`;
              }
              const isClient = msg.from === clientId;
              const rowClass = isClient ? 'from-client' : 'from-admin';
              const color = isClient ? getColor(clientId) : '#f59e0b';
              const init = isClient ? initials(getClientName(clientId)) : initials(currentUser.name);
              const avatarColor = isClient ? getColor(clientId) : '#f59e0b';
              const avatarTextColor = isClient ? '#fff' : '#000';
              const time = fmtTime(msg.ts);
              html += `
                    <div class="msg-row ${rowClass}">
                            <div class="msg-avatar" style="background:${avatarColor};color:${avatarTextColor}">${init}</div>
                                    <div class="msg-content">
                                              <div class="msg-bubble">${escapeHtml(msg.text)}</div>
                                                        <div class="msg-time">${time}</div>
                                                                </div>
                                                                      </div>`;
        });

        if (msgs.length === 0) {
              html = '<div class="no-messages"><div class="icon">💬</div>Aucun message encore.<br>Soyez le premier à écrire !</div>';
        }

        container.innerHTML = html;
        if (wasAtBottom || !silent || msgs.length !== prevCount) {
              scrollToBottom(false);
        }
        toggleScrollBtn();
    }

    function getClientName(clientId) {
        const users = getUsers ? getUsers() : [];
        const c = users.find(u => u.id === clientId);
        return c ? c.name : clientId;
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    // ── ENVOYER UN MESSAGE (ADMIN) ────────────────────
    function sendAdminMessage() {
        if (!activeClientId) return;
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        const msg = {
              from: currentUser.id,
              senderName: currentUser.name,
              text,
              type: 'admin',
              read: false
        };

        if (typeof sendMessage === 'function') {
              sendMessage(activeClientId, msg);
        }

        // Notification au client
        if (typeof addNotification === 'function') {
              addNotification(activeClientId, {
                      type: 'message',
                      title: 'Nouveau message',
                      message: 'L\'équipe SIMPACT vous a répondu : ' + text.substring(0, 60) + (text.length > 60 ? '…' : '')
              });
        }

        input.value = '';
        input.style.height = '44px';
        loadMessages(activeClientId);
        loadClientList(true);
        showToast('Message envoyé ✓');
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              sendAdminMessage();
        }
    }

    function autoResize(el) {
        el.style.height = '44px';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── SCROLL ────────────────────────────────────────
    function scrollToBottom(animated = true) {
        const c = document.getElementById('messagesContainer');
        c.scrollTo({ top: c.scrollHeight, behavior: animated ? 'smooth' : 'instant' });
    }

    function toggleScrollBtn() {
        const c = document.getElementById('messagesContainer');
        const btn = document.getElementById('scrollBtn');
        const atBottom = c.scrollHeight - c.scrollTop - c.clientHeight < 80;
        btn.style.display = atBottom ? 'none' : 'flex';
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('messagesContainer').addEventListener('scroll', toggleScrollBtn);
    });

    // ── TOAST ─────────────────────────────────────────
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── START ─────────────────────────────────────────
    init();
  </script>
  </body>

  </script></p></h3></h2></span>
  </body>
