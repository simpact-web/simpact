<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPACT Messagerie</title>
<script src="users.js?v=3"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#1a1d2e;border-bottom:1px solid #2d3148;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.logo{font-size:20px;font-weight:800;letter-spacing:1px;}
.logo span{color:#f59e0b;}
.badge-mod{background:#f59e0b;color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.btn-hub{background:#252840;border:1px solid #3d4166;color:#94a3b8;padding:6px 14px;border-radius:8px;font-size:13px;text-decoration:none;transition:all .15s;}
.btn-hub:hover{background:#2d3148;color:#e2e8f0;}
.user-badge{background:#1e2235;border:1px solid #2d3148;padding:6px 14px;border-radius:8px;font-size:13px;color:#94a3b8;}
.app{display:flex;flex:1;overflow:hidden;}
.sidebar{width:300px;background:#13151f;border-right:1px solid #1e2235;display:flex;flex-direction:column;}
.sidebar-header{padding:16px 20px;border-bottom:1px solid #1e2235;}
.sidebar-title{font-size:13px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.search-box{width:100%;background:#1a1d2e;border:1px solid #2d3148;border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:13px;outline:none;}
.search-box:focus{border-color:#f59e0b;}
.client-list{flex:1;overflow-y:auto;padding:8px;}
.client-list::-webkit-scrollbar{width:4px;}
.client-list::-webkit-scrollbar-thumb{background:#2d3148;border-radius:2px;}
.client-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:2px;}
.client-item:hover{background:#1a1d2e;}
.client-item.active{background:#1e2235;border:1px solid #2d3148;}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;}
.client-info{flex:1;min-width:0;}
.client-name{font-size:13px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-preview{font-size:11px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.client-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.client-time{font-size:10px;color:#475569;}
.unread-badge{background:#f59e0b;color:#000;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;}
.no-clients{text-align:center;padding:40px 20px;color:#475569;font-size:13px;}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#475569;}
.chat-empty .icon{font-size:48px;}
.chat-empty h3{font-size:16px;color:#64748b;}
.chat-header{background:#13151f;border-bottom:1px solid #1e2235;padding:14px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.chat-header .avatar{width:42px;height:42px;}
.chat-h-name{font-size:15px;font-weight:700;color:#e2e8f0;}
.chat-h-sub{font-size:12px;color:#64748b;margin-top:2px;}
.online-dot{display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:50%;margin-right:5px;}
.stats-bar{background:#1a1d2e;border-bottom:1px solid #1e2235;padding:0 24px;height:40px;display:flex;align-items:center;gap:24px;flex-shrink:0;}
.stat{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b;}
.stat strong{color:#94a3b8;}
.msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;}
.msgs::-webkit-scrollbar{width:4px;}
.msgs::-webkit-scrollbar-thumb{background:#2d3148;border-radius:2px;}
.msg-row{display:flex;gap:10px;max-width:70%;}
.msg-row.from-client{align-self:flex-start;}
.msg-row.from-admin{align-self:flex-end;flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;align-self:flex-end;}
.msg-col{display:flex;flex-direction:column;gap:3px;}
.bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;}
.from-client .bubble{background:#1e2235;color:#e2e8f0;border-bottom-left-radius:4px;}
.from-admin .bubble{background:#f59e0b;color:#000;font-weight:500;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:#475569;padding:0 4px;}
.from-admin .msg-time{text-align:right;}
.date-sep{text-align:center;margin:8px 0;}
.date-sep span{background:#1a1d2e;color:#475569;font-size:11px;padding:3px 12px;border-radius:12px;}
.chat-wrap{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.input-area{background:#13151f;border-top:1px solid #1e2235;padding:16px 24px;flex-shrink:0;}
.input-row{display:flex;gap:10px;align-items:flex-end;}
.msg-input{flex:1;background:#1a1d2e;border:1px solid #2d3148;border-radius:12px;padding:10px 16px;color:#e2e8f0;font-size:14px;resize:none;outline:none;min-height:44px;max-height:120px;font-family:inherit;line-height:1.4;transition:border-color .15s;}
.msg-input:focus{border-color:#f59e0b;}
.msg-input::placeholder{color:#475569;}
.btn-send{background:#f59e0b;color:#000;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;font-weight:700;font-size:13px;transition:all .15s;white-space:nowrap;height:44px;}
.btn-send:hover{background:#fbbf24;}
.toast{position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.no-msgs{text-align:center;padding:40px;color:#475569;font-size:13px;margin:auto;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">SIMP<span>ACT</span></div>
    <span class="badge-mod">💬 Messagerie</span>
  </div>
  <div class="topbar-right">
    <a href="hub.html" class="btn-hub">← Hub</a>
    <div class="user-badge" id="userBadge">—</div>
  </div>
</div>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Conversations</div>
      <input class="search-box" type="text" id="searchInput" placeholder="Rechercher un client..." oninput="filterClients()">
    </div>
    <div class="client-list" id="clientList"></div>
  </div>
  <div class="chat-area">
    <div class="chat-empty" id="chatEmpty">
      <div class="icon">💬</div>
      <h3>Centre de Messagerie</h3>
      <p>Selectionnez une conversation</p>
    </div>
    <div class="chat-wrap" id="chatWrap" style="display:none;">
      <div class="chat-header" id="chatHeader"></div>
      <div class="stats-bar" id="statsBar"></div>
      <div class="msgs" id="msgs"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea class="msg-input" id="msgInput" placeholder="Repondre au client..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="btn-send" onclick="sendMsg()">Envoyer</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var CUR=null,ACT=null,ALL=[];
var COLORS=['#6366f1','#8b5cf6','#ec4899','#14b8a6','#f59e0b','#22c55e','#3b82f6','#ef4444','#06b6d4','#84cc16'];
function gc(s){var h=0;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length];}
function gi(n){return n.split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();}
function ft(iso){if(!iso)return'';var d=new Date(iso),now=new Date(),diff=now-d;if(diff<60000)return'maintenant';if(diff<3600000)return Math.floor(diff/60000)+'m';if(diff<86400000)return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});}
function fd(iso){if(!iso)return'';var d=new Date(iso),now=new Date(),diff=now-d;if(diff<86400000&&d.getDate()===now.getDate())return'Aujourd hui';if(diff<172800000)return'Hier';return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});}
function init(){CUR=checkAuth(['superadmin','admin','commercial']);if(!CUR)return;document.getElementById('userBadge').textContent=CUR.name;loadList();setInterval(function(){loadList(true);if(ACT)loadMsgs(ACT,true);},3000);}
function loadList(s){var users=getUsers?getUsers():[];ALL=users.filter(function(u){return u.role==='client';});renderList(ALL,s);}
function renderList(clients,silent){
  var list=document.getElementById('clientList');
  var search=document.getElementById('searchInput').value.toLowerCase();
  var filtered=clients.filter(function(c){return c.name.toLowerCase().indexOf(search)>=0||c.id.toLowerCase().indexOf(search)>=0;});
  if(!filtered.length){list.innerHTML='<div class="no-clients">Aucun client</div>';return;}
  var enriched=filtered.map(function(c){var msgs=getMessages?getMessages(c.id):[];var unread=msgs.filter(function(m){return!m.read&&m.from===c.id;}).length;var last=msgs[msgs.length-1]||null;return Object.assign({},c,{msgs:msgs,unread:unread,last:last});});
  enriched.sort(function(a,b){if(b.unread!==a.unread)return b.unread-a.unread;var ta=a.last?new Date(a.last.ts):new Date(0);var tb=b.last?new Date(b.last.ts):new Date(0);return tb-ta;});
  var sp=list.scrollTop;
  var html='';
  for(var i=0;i<enriched.length;i++){
    var c=enriched[i];
    var color=gc(c.id);
    var init=gi(c.name);
    var preview=c.last?(c.last.from===c.id?'':'> ')+c.last.text.substring(0,35):'Aucun message';
    var time=c.last?ft(c.last.ts):'';
    var active=c.id===ACT?'active':'';
    var ub=c.unread>0?'<span class="unread-badge">'+c.unread+'</span>':'';
    html+='<div class="client-item '+active+'" onclick="openChat(this.dataset.id)" data-id="'+c.id+'"><div class="avatar" style="background:'+color+'">'+init+'</div><div class="client-info"><div class="client-name">'+c.name+'</div><div class="client-preview">'+preview+'</div></div><div class="client-meta"><span class="client-time">'+time+'</span>'+ub+'</div></div>';
  }
  list.innerHTML=html;
  list.scrollTop=sp;
}
function filterClients(){renderList(ALL);}
function openChat(id){
  ACT=id;
  var users=getUsers?getUsers():[];
  var client=users.find(function(u){return u.id===id;});
  if(!client)return;
  if(typeof markMessagesRead==='function')markMessagesRead(id);
  document.getElementById('chatEmpty').style.display='none';
  var cw=document.getElementById('chatWrap');
  cw.style.display='flex';cw.style.flexDirection='column';
  var color=gc(id);
  var init=gi(client.name);
  var sector=client.sector||'Client';
  var msgs=getMessages?getMessages(id):[];
  var hdr=document.getElementById('chatHeader');
  hdr.innerHTML='<div class="avatar" style="background:'+color+'">'+init+'</div><div><div class="chat-h-name">'+client.name+'</div><div class="chat-h-sub"><span class="online-dot"></span>'+sector+' - '+msgs.length+' msg</div></div>';
  var orders=typeof getOrders==='function'?getOrders().filter(function(o){return o.clientId===id||o.client===id;}):[];
  var ca=orders.reduce(function(s,o){return s+parseFloat(o.price||0);},0);
  var sb=document.getElementById('statsBar');
  sb.innerHTML='<div class="stat">Cmds: <strong>'+orders.length+'</strong></div><div class="stat">CA: <strong>'+ca.toFixed(0)+' DT</strong></div><div class="stat">Email: <strong>'+(client.email||'-')+'</strong></div>';
  loadMsgs(id);
  renderList(ALL);
  document.getElementById('msgInput').focus();
}
function getName(id){var u=getUsers?getUsers():[];var c=u.find(function(x){return x.id===id;});return c?c.name:id;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function loadMsgs(id,silent){
  var msgs=getMessages?getMessages(id):[];
  var container=document.getElementById('msgs');
  var atBottom=container.scrollHeight-container.scrollTop-container.clientHeight<80;
  var html='';
  var lastDate='';
  for(var i=0;i<msgs.length;i++){
    var msg=msgs[i];
    var d=fd(msg.ts);
    if(d!==lastDate){lastDate=d;html+='<div class="date-sep"><span>'+d+'</span></div>';}
    var isClient=msg.from===id;
    var rowClass=isClient?'from-client':'from-admin';
    var ac=isClient?gc(id):'#f59e0b';
    var atc=isClient?'#fff':'#000';
    var init=isClient?gi(getName(id)):gi(CUR.name);
    html+='<div class="msg-row '+rowClass+'"><div class="msg-av" style="background:'+ac+';color:'+atc+'">'+init+'</div><div class="msg-col"><div class="bubble">'+esc(msg.text)+'</div><div class="msg-time">'+ft(msg.ts)+'</div></div></div>';
  }
  if(!msgs.length)html='<div class="no-msgs">Aucun message. Ecrivez le premier !</div>';
  container.innerHTML=html;
  if(atBottom||!silent)container.scrollTo({top:container.scrollHeight,behavior:'instant'});
}
function sendMsg(){
  if(!ACT)return;
  var input=document.getElementById('msgInput');
  var text=input.value.trim();
  if(!text)return;
  var msg={from:CUR.id,senderName:CUR.name,text:text,type:'admin',read:false};
  if(typeof sendMessage==='function')sendMessage(ACT,msg);
  if(typeof addNotification==='function')addNotification(ACT,{type:'message',title:'Nouveau message',message:'SIMPACT: '+text.substring(0,60)});
  input.value='';
  input.style.height='44px';
  loadMsgs(ACT);
  loadList(true);
  toast('Message envoye');
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoResize(el){el.style.height='44px';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
init();
</script>
</body>
</html>
