<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPACT — Atelier Production</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="users.js?v=3"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f; --card: #111118; --card2: #16161f;
            --text: #f1f0ed; --amber: #f0a500; --green: #10b981; --blue: #3b82f6;
            --red: #ef4444; --border: #1e1e2a; --muted: #6b7280;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* TOPBAR */
        .topbar { background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 2rem; position: sticky; top: 0; z-index: 100; }
        .topbar-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .topbar-brand span { background: var(--amber); color: var(--bg); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .user-chip { background: rgba(255,255,255,0.07); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; color: #94a3b8; }
        .btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #94a3b8; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .btn-logout:hover { color: white; border-color: rgba(255,255,255,0.3); }
        .btn-hub { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #94a3b8; padding: 5px 12px; border-radius: 6px; font-size: 0.82rem; text-decoration: none; transition: 0.2s; }
        .btn-hub:hover { color: var(--amber); border-color: var(--amber); }

        /* STATS BAR */
        .stats-bar { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
        .stat-item { flex: 1; background: var(--card); padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 2px; }
        .stat-num { font-family: 'DM Mono', monospace; font-size: 1.6rem; font-weight: 500; }
        .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .num-amber { color: var(--amber); }
        .num-green { color: var(--green); }
        .num-blue { color: var(--blue); }

        /* KANBAN */
        .kanban { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
        .kanban-col { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .col-header { padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .col-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .col-count { background: rgba(255,255,255,0.07); color: #94a3b8; padding: 2px 8px; border-radius: 10px; font-size: 0.78rem; font-family: 'DM Mono', monospace; }
        .col-body { padding: 1rem; display: flex; flex-direction: column; gap: 10px; min-height: 200px; }

        /* ORDER CARD */
        .order-card { background: var(--card2); border: 1px solid var(--border); border-left: 3px solid var(--amber); border-radius: 10px; padding: 1.1rem; transition: all 0.2s; }
        .order-card:hover { border-color: rgba(240,165,0,0.4); transform: translateY(-1px); }
        .order-card.done { border-left-color: var(--green); opacity: 0.7; }
        .order-card.urgent { border-left-color: var(--red); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } 50% { box-shadow: 0 0 0 4px rgba(239,68,68,0.15); } }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
        .card-ref { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); }
        .card-date { font-size: 0.72rem; color: var(--muted); }
        .card-product { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 3px; }
        .card-client { font-size: 0.85rem; color: var(--amber); font-weight: 500; margin-bottom: 0.75rem; }
        .card-qty { display: inline-block; background: rgba(240,165,0,0.1); border: 1px solid rgba(240,165,0,0.2); color: var(--amber); padding: 2px 8px; border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 0.8rem; margin-bottom: 0.75rem; }
        .specs-box { background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.08); border-radius: 6px; padding: 0.75rem; font-size: 0.82rem; line-height: 1.6; color: #94a3b8; white-space: pre-line; margin-bottom: 1rem; max-height: 100px; overflow-y: auto; }
        .delai-badge { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; margin-bottom: 0.75rem; font-weight: 600; }
        .delai-express { background: rgba(239,68,68,0.15); color: #f87171; }
        .delai-urgence { background: rgba(239,68,68,0.3); color: var(--red); }

        .card-actions { display: flex; gap: 8px; }
        .btn-fiche { flex: 1; padding: 0.6rem; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-family: 'DM Sans', sans-serif; transition: 0.2s; }
        .btn-fiche:hover { border-color: var(--blue); color: var(--blue); }
        .btn-toggle { flex: 2; padding: 0.6rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 600; font-family: 'DM Sans', sans-serif; transition: 0.2s; }
        .btn-toggle.pending { background: var(--amber); color: #0a0a0f; }
        .btn-toggle.done { background: var(--green); color: white; }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
        .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.4; }

        /* PDF */
        #pdf-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 20px; }
        #pdf-template { background: white; width: 210mm; min-height: 297mm; padding: 18mm 20mm; box-sizing: border-box; font-family: Arial, sans-serif; color: #000; }
        .pdf-h { display: flex; justify-content: space-between; border-bottom: 3px solid #000; padding-bottom: 16px; margin-bottom: 24px; }
        .pdf-title { font-size: 22px; font-weight: 900; margin: 0; }
        .pdf-brand { font-size: 22px; font-weight: 900; color: #f0a500; }
        .pdf-meta { background: #f5f5f5; padding: 14px; border-radius: 6px; font-size: 13px; line-height: 1.8; margin-bottom: 20px; }
        .pdf-atelier { border: 2px dashed #ea580c; padding: 20px; border-radius: 6px; }
        .pdf-at-title { color: #ea580c; font-weight: 700; font-size: 14px; margin-bottom: 12px; }
        .pdf-at-content { font-size: 14px; line-height: 1.7; }
        #pdf-btns { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: white; padding: 12px; border-radius: 50px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        #pdf-btns button { padding: 12px 28px; border: none; border-radius: 30px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">SIMPACT <span>ATELIER</span></div>
    <div class="topbar-right">
        <a href="hub.html" class="btn-hub">← Hub</a>
        <span class="user-chip" id="user-display">—</span>
        <button class="btn-logout" onclick="logout()">Quitter</button>
    </div>
</div>

<div class="stats-bar">
    <div class="stat-item"><span class="stat-num num-amber" id="stat-waiting">0</span><span class="stat-label">En attente</span></div>
    <div class="stat-item"><span class="stat-num num-green" id="stat-done">0</span><span class="stat-label">Terminées</span></div>
    <div class="stat-item"><span class="stat-num num-blue" id="stat-total">0</span><span class="stat-label">Total</span></div>
    <div class="stat-item"><span class="stat-num" id="stat-urgent" style="color:#ef4444">0</span><span class="stat-label">Urgentes</span></div>
</div>

<div class="kanban">
    <div class="kanban-col">
        <div class="col-header">
            <div class="col-title">⏳ En cours / En attente <span class="col-count" id="count-pending">0</span></div>
        </div>
        <div class="col-body" id="col-pending"></div>
    </div>
    <div class="kanban-col">
        <div class="col-header">
            <div class="col-title">✅ Terminées <span class="col-count" id="count-done">0</span></div>
        </div>
        <div class="col-body" id="col-done"></div>
    </div>
</div>

<!-- PDF OVERLAY -->
<div id="pdf-overlay">
    <div id="pdf-template">
        <div class="pdf-h">
            <div><h1 class="pdf-title" style="color:#ea580c;">ORDRE DE FABRICATION</h1><p style="font-size:12px;color:#666;margin:4px 0;">Réf: <strong id="p-ref"></strong> &nbsp;|&nbsp; Date: <span id="p-date"></span></p></div>
            <div style="text-align:right;"><p class="pdf-brand">SIMPACT</p><p style="font-size:11px;color:#666;margin:0;">Impression Numérique</p></div>
        </div>
        <div class="pdf-meta">
            <strong>Client :</strong> <span id="p-client"></span><br>
            <strong>Produit :</strong> <span id="p-prod"></span><br>
            <strong>Quantité :</strong> <strong id="p-qty" style="font-size:1.3em;"></strong><br>
            <strong>Délai :</strong> <span id="p-delai"></span>
        </div>
        <div class="pdf-atelier">
            <div class="pdf-at-title">⚠️ INSTRUCTIONS TECHNIQUES ATELIER</div>
            <div class="pdf-at-content" id="p-desc"></div>
        </div>
    </div>
    <div id="pdf-btns">
        <button onclick="downloadFiche()" style="background:#1a4fff;color:white;">💾 Télécharger PDF</button>
        <button onclick="document.getElementById('pdf-overlay').style.display='none'" style="background:#f1f5f9;color:#0a0a0f;">✕ Fermer</button>
    </div>
</div>

<script>
    const user = checkAuth(['production', 'admin']);
    if (user) document.getElementById('user-display').textContent = user.name;

    let currentPdfOrder = null;

    function renderOrders() {
        const orders = getOrders();
        const active = orders.filter(o => o.statusProd !== 'Terminé' && o.statusProd !== 'Annulée' && o.statusProd !== 'À Valider (Web)');
        const done = orders.filter(o => o.statusProd === 'Terminé');
        const urgent = active.filter(o => o.delai && (o.delai.includes('Express') || o.delai.includes('Urgence')));

        document.getElementById('stat-waiting').textContent = active.length;
        document.getElementById('stat-done').textContent = done.length;
        document.getElementById('stat-total').textContent = orders.filter(o => o.statusProd !== 'Annulée').length;
        document.getElementById('stat-urgent').textContent = urgent.length;
        document.getElementById('count-pending').textContent = active.length;
        document.getElementById('count-done').textContent = done.length;

        const colP = document.getElementById('col-pending');
        const colD = document.getElementById('col-done');

        if (!active.length) {
            colP.innerHTML = '<div class="empty-state"><div class="empty-icon">😴</div><div>Aucune commande en attente</div></div>';
        } else {
            colP.innerHTML = active.map(o => buildCard(o, false)).join('');
        }

        if (!done.length) {
            colD.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div>Aucune commande terminée</div></div>';
        } else {
            colD.innerHTML = done.slice(0, 20).map(o => buildCard(o, true)).join('');
        }
    }

    function buildCard(o, isDone) {
        const isUrgent = o.delai && (o.delai.includes('Urgence'));
        const isExpress = o.delai && o.delai.includes('Express');
        let delai_html = '';
        if (isUrgent) delai_html = `<span class="delai-badge delai-urgence">🔴 URGENCE</span>`;
        else if (isExpress) delai_html = `<span class="delai-badge delai-express">🟠 EXPRESS</span>`;

        return `<div class="order-card ${isDone ? 'done' : ''} ${isUrgent ? 'urgent' : ''}">
            <div class="card-top"><span class="card-ref">#${o.ref}</span><span class="card-date">${o.date}</span></div>
            <div class="card-product">${o.prod}</div>
            <div class="card-client">${o.client}</div>
            ${delai_html}
            <div class="card-qty">Qté: ${o.qty}</div>
            <div class="specs-box">${o.desc || '—'}</div>
            <div class="card-actions">
                <button class="btn-fiche" onclick="openFiche('${o.ref}')">📄 Fiche</button>
                <button class="btn-toggle ${isDone ? 'done' : 'pending'}" onclick="toggleStatus('${o.ref}')">
                    ${isDone ? '✅ Terminé — Annuler' : '⚙️ Marquer Terminé'}
                </button>
            </div>
        </div>`;
    }

    function toggleStatus(ref) {
        const orders = getOrders();
        const o = orders.find(x => x.ref === ref);
        if (!o) return;
        const newStatus = o.statusProd === 'Terminé' ? 'En attente' : 'Terminé';
        updateOrderStatus(ref, newStatus, 'prod');
        renderOrders();
    }

    function openFiche(ref) {
        const o = getOrders().find(x => x.ref === ref);
        if (!o) return;
        currentPdfOrder = o;
        document.getElementById('p-ref').textContent = o.ref;
        document.getElementById('p-date').textContent = new Date().toLocaleDateString('fr-FR');
        document.getElementById('p-client').textContent = o.client;
        document.getElementById('p-prod').textContent = o.prod;
        document.getElementById('p-qty').textContent = o.qty;
        document.getElementById('p-delai').textContent = o.delai || 'Standard';
        document.getElementById('p-desc').innerHTML = (o.desc || '').replace(/\n/g, '<br>');
        document.getElementById('pdf-overlay').style.display = 'flex';
    }

    function downloadFiche() {
        if (!currentPdfOrder) return;
        const opt = {
            margin: 10,
            filename: `OF_${currentPdfOrder.ref}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().from(document.getElementById('pdf-template')).set(opt).save();
    }

    renderOrders();
    setInterval(renderOrders, 5000);
</script>
</body>
</html>
